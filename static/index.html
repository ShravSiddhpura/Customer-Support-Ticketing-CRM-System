<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CST Support CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Base Body Style & iOS System Font */
        body {
            background-color: #f4f6f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
        }
        
        /* Dotted Background */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(#c4cbce 0.25px, transparent 1.5px);
            background-size: 24px 24px;
            z-index: -1;
        }
        
        /* Fluid Glassmorphism (More liquid, less solid white) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.08);
        }
        
        /* Input Fields */
        .glass-input {
            background: rgba(255, 255, 255, 0.2); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.03);
            color: #374151;
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.4);
            border-color: rgba(106, 93, 184, 0.5);
        }

        /* Glass Table Header */
        .glass-header {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* Custom Dropdown Arrow */
        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236a5db8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
        }
    </style>
</head>
<body class="text-gray-800 min-h-screen">
    
    <!-- Glass Navbar -->
    <nav class="bg-[#6a5db8]/80 backdrop-blur-xl border-b border-white/20 text-white sticky top-0 z-40 shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center p-4">
            <h1 class="text-xl font-semibold tracking-tight">CST Support CRM</h1>
            <button onclick="openCreateModal()" class="bg-white/20 backdrop-blur-md border border-white/30 text-white px-4 py-2 rounded-xl font-medium hover:bg-white/30 transition shadow-sm">
                + New Ticket
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto mt-8 p-4">
        
        <!-- Controls: Search, Filter & Sort -->
        <div class="flex flex-col md:flex-row justify-between mb-6 gap-4">
            
            <!-- Restored Search Bar: Triggers instantly on keystroke -->
            <input type="text" id="searchInput" placeholder="Search by ID, name, email..." 
                   class="w-full md:w-1/3 p-2.5 glass-input rounded-xl outline-none focus:ring-2 focus:ring-[#6a5db8]/50 transition"
                   onkeyup="fetchTickets()">

            <div class="flex gap-4 w-full md:w-auto">
                <select id="statusFilter" class="w-full md:w-auto p-2.5 pr-10 glass-panel rounded-xl outline-none text-gray-700 cursor-pointer focus:ring-2 focus:ring-[#6a5db8]/50 font-medium transition" onchange="fetchTickets()">
                    <option value="">All Statuses</option>
                    <option value="Open">Open</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Closed">Closed</option>
                </select>

                <select id="sortFilter" class="w-full md:w-auto p-2.5 pr-10 glass-panel rounded-xl outline-none text-gray-700 cursor-pointer focus:ring-2 focus:ring-[#6a5db8]/50 font-medium transition" onchange="fetchTickets()">
                    <option value="date_desc">Newest First</option>
                    <option value="date_asc">Oldest First</option>
                    <option value="priority">Sort by Priority (High to Low)</option>
                </select>
            </div>
        </div>

        <!-- Glass Tickets Table -->
        <div class="glass-panel rounded-3xl overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="glass-header">
                    <tr>
                        <th class="p-4 pl-6 font-medium text-gray-500 text-sm tracking-wide">ID</th>
                        <th class="p-4 font-medium text-gray-500 text-sm tracking-wide">Customer</th>
                        <th class="p-4 font-medium text-gray-500 text-sm tracking-wide">Subject</th>
                        <th class="p-4 font-medium text-gray-500 text-sm tracking-wide">Priority</th>
                        <th class="p-4 font-medium text-gray-500 text-sm tracking-wide">Status</th>
                        <th class="p-4 font-medium text-gray-500 text-sm tracking-wide">Date</th>
                        <th class="p-4 pr-6 font-medium text-gray-500 text-sm tracking-wide">Action</th>
                    </tr>
                </thead>
                <tbody id="ticketTableBody" class="divide-y divide-white/30">
                    <!-- Tickets will be injected here via JavaScript -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- ================= CREATE TICKET MODAL ================= -->
    <div id="createModal" class="hidden fixed inset-0 bg-slate-900/20 backdrop-blur-md flex justify-center items-center p-4 z-50">
        <div class="glass-panel rounded-3xl w-full max-w-lg overflow-hidden border border-white/50 shadow-2xl">
            <div class="bg-[#6a5db8]/85 backdrop-blur-md p-5 text-white flex justify-between items-center border-b border-[#6a5db8]/30">
                <h2 class="text-lg font-semibold">Create New Ticket</h2>
                <button onclick="closeCreateModal()" class="font-bold hover:text-gray-200 text-2xl leading-none">&times;</button>
            </div>
            <form id="createForm" onsubmit="submitCreateTicket(event)" class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-600 ml-1">Customer Name</label>
                    <input type="text" id="c_name" required class="w-full mt-1 p-3 glass-input rounded-xl outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 ml-1">Customer Email</label>
                    <input type="email" id="c_email" required class="w-full mt-1 p-3 glass-input rounded-xl outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 ml-1">Subject</label>
                    <input type="text" id="c_subject" required class="w-full mt-1 p-3 glass-input rounded-xl outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 ml-1">Description</label>
                    <textarea id="c_desc" rows="3" required class="w-full mt-1 p-3 glass-input rounded-xl outline-none"></textarea>
                </div>
                <div class="flex justify-end gap-3 pt-4">
                    <button type="button" onclick="closeCreateModal()" class="px-5 py-2.5 font-medium text-gray-600 glass-input rounded-xl hover:bg-white/40 transition">Cancel</button>
                    <button id="createSubmitBtn" type="submit" class="px-5 py-2.5 font-medium text-white bg-[#6a5db8]/90 border border-[#6a5db8]/30 rounded-xl hover:bg-[#6a5db8] transition shadow-sm">Submit Ticket</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ================= VIEW TICKET MODAL ================= -->
    <div id="viewModal" class="hidden fixed inset-0 bg-slate-900/20 backdrop-blur-md flex justify-center items-center p-4 z-50">
        <div class="glass-panel rounded-3xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh] border border-white/50 shadow-2xl">
            <div class="glass-header p-5 flex justify-between items-center">
                <h2 class="text-lg font-semibold text-gray-800 truncate" id="v_title">Ticket Details</h2>
                <button onclick="closeViewModal()" class="font-bold text-gray-500 hover:text-gray-800 text-2xl leading-none">&times;</button>
            </div>
            
            <div class="p-6 overflow-y-auto space-y-6">
                <div class="grid grid-cols-2 gap-4 text-sm glass-input p-5 rounded-2xl">
                    <div><span class="font-medium text-gray-500">ID:</span> <span id="v_id" class="font-semibold text-[#6a5db8]"></span></div>
                    <div><span class="font-medium text-gray-500">Customer:</span> <span id="v_name" class="font-medium text-gray-800"></span></div>
                    <div><span class="font-medium text-gray-500">Email:</span> <span id="v_email" class="font-medium text-gray-800"></span></div>
                    <div><span class="font-medium text-gray-500">Date:</span> <span id="v_date" class="font-medium text-gray-800"></span></div>
                </div>

                <div>
                    <h3 class="font-medium text-gray-600 mb-2 ml-1">Issue Description</h3>
                    <div id="v_desc" class="p-5 glass-input rounded-2xl text-gray-700 text-sm whitespace-pre-wrap leading-relaxed"></div>
                </div>

                <div class="bg-[#6a5db8]/5 backdrop-blur-md p-5 rounded-2xl border border-[#6a5db8]/10">
                    
                    <!-- Top Status Row -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end mb-5">
                        <div class="w-full">
                            <label class="block text-sm font-medium text-gray-600 mb-1 ml-1">Status</label>
                            <select id="v_status" class="w-full p-3 glass-input rounded-xl outline-none">
                                <option value="Open">Open</option>
                                <option value="In Progress">In Progress</option>
                                <option value="Closed">Closed</option>
                            </select>
                        </div>
                        <div class="w-full">
                            <label class="block text-sm font-medium text-gray-600 mb-1 ml-1">AI Assessed Priority</label>
                            <input type="text" id="v_priority" readonly class="w-full p-3 glass-input rounded-xl font-semibold cursor-not-allowed opacity-80">
                        </div>
                        <div class="w-full">
                            <button onclick="updateTicket()" class="w-full bg-[#6a5db8]/90 border border-[#6a5db8]/30 text-white px-4 py-3 rounded-xl hover:bg-[#6a5db8] transition font-medium shadow-sm">
                                Save Status
                            </button>
                        </div>
                    </div>

                    <!-- Notes Section -->
                    <div class="border-t border-[#6a5db8]/20 pt-4">
                        <h4 class="text-sm font-medium text-[#6a5db8] mb-3 ml-1">Internal Notes & History</h4>
                        
                        <!-- List of Notes -->
                        <div id="v_notes_list" class="space-y-3 mb-4 max-h-40 overflow-y-auto pr-2 rounded-xl">
                            <!-- Notes will be injected here via JavaScript -->
                        </div>

                        <!-- Add Note Input -->
                        <div class="flex gap-2">
                            <input type="text" id="new_note_input" class="w-full p-3 glass-input rounded-xl outline-none focus:ring-2 focus:ring-[#6a5db8]/50" 
                                   placeholder="Type a new internal note..." 
                                   onkeydown="if(event.key === 'Enter') addNote()">
                            <button onclick="addNote()" class="px-5 py-3 bg-white/60 border border-[#6a5db8]/30 text-[#6a5db8] font-medium rounded-xl hover:bg-white/90 transition shadow-sm">
                                Add
                            </button>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
